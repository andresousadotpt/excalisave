services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: "${POSTGRES_DB:-excalisave}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-excalisave}?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:?Set AUTH_SECRET in .env (use: openssl rand -base64 32)}"
      AUTH_URL: "${AUTH_URL:-http://localhost:3000}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      REGISTRATION_ENABLED: "${REGISTRATION_ENABLED:-true}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      EMAIL_FROM: "${EMAIL_FROM:-Excalisave <noreply@example.com>}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env (use: openssl rand -hex 32)}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}"
    depends_on:
      db:
        condition: service_healthy

  collab-server:
    build: ./collab-server
    restart: unless-stopped
    ports:
      - "${COLLAB_PORT:-4000}:4000"
    environment:
      PORT: "4000"
      ALLOWED_ORIGINS: "${COLLAB_ALLOWED_ORIGINS:-http://localhost:3000}"
      MAX_ROOM_SIZE: "${COLLAB_MAX_ROOM_SIZE:-10}"

volumes:
  pgdata:
